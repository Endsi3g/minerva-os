name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v4.6.0)'
        required: true
        default: 'v4.6.0'

permissions:
  contents: write

jobs:
  # ── Web release (Next.js build) ─────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          RELEASE_TAG="${{ steps.tag.outputs.name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${RELEASE_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-decorate)
          else
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-decorate)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS | `Minerva OS.dmg` (see assets below) |
            | Windows | `Minerva OS Setup.exe` (see assets below) |
            | Web | Deployed via Next.js |

  # ── macOS Electron build ────────────────────────────────────────────────────
  electron-mac:
    name: Electron — macOS
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Package Electron app (macOS)
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.upload_url && steps.tag.outputs.name }}
          files: electron-dist/*.dmg

  # ── Windows Electron build ──────────────────────────────────────────────────
  electron-win:
    name: Electron — Windows
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Package Electron app (Windows)
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.upload_url && steps.tag.outputs.name }}
          files: electron-dist/*.exe
